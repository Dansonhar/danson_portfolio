<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <!-- Black header -->
  <rect width="1200" height="130" fill="#0a0a0a"/>
  <text x="60" y="50" font-family="Arial Black, sans-serif" font-weight="900" font-size="24" fill="white" letter-spacing="2">SUPERPOS</text>
  <text x="60" y="85" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="white">Solutions at Your Fingertips</text>
  <rect x="60" y="98" width="400" height="28" rx="5" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="85" y="116" font-family="Arial, sans-serif" font-size="12" fill="#666">🔍  Search by feature, issue, or module...</text>

  <!-- White content -->
  <rect x="0" y="130" width="1200" height="570" fill="white"/>

  <!-- Breadcrumb -->
  <text x="60" y="162" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">Home</text>
  <text x="103" y="162" font-family="Arial, sans-serif" font-size="12" fill="#999"> › </text>
  <text x="120" y="162" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">Setting Up</text>
  <text x="193" y="162" font-family="Arial, sans-serif" font-size="12" fill="#999"> › How to Manage Your Stores</text>

  <!-- Article title -->
  <text x="60" y="200" font-family="Arial, sans-serif" font-weight="700" font-size="24" fill="#111">How to Manage Your Stores</text>
  <text x="60" y="222" font-family="Arial, sans-serif" font-size="12" fill="#999">⏱ 1 min  •  Updated 1/04/2026</text>

  <!-- Intro box -->
  <rect x="60" y="235" width="640" height="36" rx="4" fill="#f5f5f5" stroke="#e5e5e5" stroke-width="1"/>
  <text x="80" y="258" font-family="Arial, sans-serif" font-size="13" fill="#555">Manage your business outlets and physical store locations.</text>

  <!-- Step by step heading -->
  <text x="60" y="300" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="#111">Step-by-Step Guide</text>
  <text x="60" y="330" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#111">Add a New Store</text>
  <text x="60" y="354" font-family="Arial, sans-serif" font-size="13" fill="#444">1. In your StoreHub BackOffice, go to 'Settings', then tap 'Outlets'</text>

  <!-- Screenshot mockup of BackOffice -->
  <rect x="60" y="368" width="640" height="160" rx="6" fill="#f9f9f9" stroke="#e5e5e5" stroke-width="1"/>
  <!-- BackOffice UI mockup -->
  <rect x="60" y="368" width="160" height="160" fill="#1e293b"/>
  <text x="75" y="395" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Navigation</text>
  <rect x="75" y="402" width="130" height="10" rx="2" fill="#334155"/>
  <rect x="75" y="418" width="130" height="10" rx="2" fill="#334155"/>
  <rect x="75" y="434" width="130" height="10" rx="2" fill="#0ea5e9"/>
  <rect x="75" y="450" width="130" height="10" rx="2" fill="#334155"/>
  <rect x="75" y="466" width="130" height="10" rx="2" fill="#334155"/>
  <!-- Main content area -->
  <rect x="220" y="378" width="470" height="140" fill="white"/>
  <text x="235" y="400" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#111">Outlets</text>
  <rect x="620" y="385" width="60" height="22" rx="4" fill="#0ea5e9"/>
  <text x="632" y="400" font-family="Arial, sans-serif" font-size="10" fill="white">+ Add</text>
  <rect x="235" y="412" width="440" height="18" rx="2" fill="#f1f5f9"/>
  <rect x="235" y="436" width="440" height="18" rx="2" fill="#f8fafc"/>
  <rect x="235" y="460" width="440" height="18" rx="2" fill="#f1f5f9"/>
  <rect x="235" y="484" width="440" height="18" rx="2" fill="#f8fafc"/>

  <!-- Step 2 -->
  <text x="60" y="548" font-family="Arial, sans-serif" font-size="13" fill="#444">2. On the 'Outlet' page, tap the 'Add-Outlet' button.</text>
  <text x="60" y="572" font-family="Arial, sans-serif" font-size="13" fill="#444">3. Fill in your new store's details in the fields provided.</text>

  <!-- Right sidebar -->
  <rect x="860" y="190" width="280" height="340" rx="6" fill="#f8f8f8" stroke="#e5e5e5" stroke-width="1"/>
  <text x="880" y="218" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#111">Overview</text>
  <line x1="860" y1="228" x2="1140" y2="228" stroke="#e5e5e5" stroke-width="1"/>
  <text x="880" y="252" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">Step-by-Step Guide</text>
  <text x="880" y="276" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">Add a New Store</text>
  <text x="880" y="300" font-family="Arial, sans-serif" font-size="12" fill="#555">1. Go to Settings → Outlets</text>
  <text x="880" y="320" font-family="Arial, sans-serif" font-size="12" fill="#555">2. Tap the Add-Outlet button</text>
  <text x="880" y="340" font-family="Arial, sans-serif" font-size="12" fill="#555">3. Fill in store details</text>
  <text x="880" y="360" font-family="Arial, sans-serif" font-size="12" fill="#555">4. Choose Receipt Template</text>
  <text x="880" y="380" font-family="Arial, sans-serif" font-size="12" fill="#555">5. Tap Save</text>
  <text x="880" y="414" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">Need more help?</text>
</svg>
