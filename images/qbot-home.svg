<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <!-- Black header -->
  <rect width="1200" height="160" fill="#0a0a0a"/>
  <!-- SUPERPOS logo -->
  <text x="60" y="60" font-family="Arial Black, sans-serif" font-weight="900" font-size="28" fill="white" letter-spacing="2">SUPERPOS</text>
  <!-- Heading -->
  <text x="60" y="105" font-family="Arial, sans-serif" font-weight="700" font-size="30" fill="white">Solutions at Your Fingertips</text>
  <!-- Search bar -->
  <rect x="60" y="118" width="440" height="36" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="90" y="141" font-family="Arial, sans-serif" font-size="13" fill="#666">🔍  Search by feature, issue, or module...</text>

  <!-- White content area -->
  <rect x="0" y="160" width="1200" height="540" fill="#f8f8f8"/>

  <!-- Browse by Category heading -->
  <text x="60" y="220" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#111">Browse by Category</text>

  <!-- Category cards row 1 -->
  <!-- Card 1: Getting Started -->
  <rect x="60" y="240" width="340" height="120" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="90" y="275" font-family="Arial, sans-serif" font-size="22" fill="#555">📁</text>
  <text x="90" y="300" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#111">Getting Started</text>
  <text x="90" y="318" font-family="Arial, sans-serif" font-size="12" fill="#777">Learn the basics of SUPERPOS</text>
  <text x="90" y="348" font-family="Arial, sans-serif" font-size="12" fill="#aaa">12 articles</text>

  <!-- Card 2: Setting Up -->
  <rect x="430" y="240" width="340" height="120" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="460" y="275" font-family="Arial, sans-serif" font-size="22" fill="#555">📁</text>
  <text x="460" y="300" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#111">Setting Up</text>
  <text x="460" y="318" font-family="Arial, sans-serif" font-size="12" fill="#777">Your step-by-step guide to setting up</text>
  <text x="460" y="348" font-family="Arial, sans-serif" font-size="12" fill="#aaa">17 articles</text>

  <!-- Card 3: Point of Sale -->
  <rect x="800" y="240" width="340" height="120" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="830" y="275" font-family="Arial, sans-serif" font-size="22" fill="#555">📁</text>
  <text x="830" y="300" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#111">Point of Sale (POS) System</text>
  <text x="830" y="318" font-family="Arial, sans-serif" font-size="12" fill="#777">Transform your checkout process</text>
  <text x="830" y="348" font-family="Arial, sans-serif" font-size="12" fill="#aaa">20 articles</text>

  <!-- Category cards row 2 -->
  <!-- Card 4: BackOffice -->
  <rect x="60" y="380" width="340" height="120" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="90" y="415" font-family="Arial, sans-serif" font-size="22" fill="#555">📁</text>
  <text x="90" y="440" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#111">BackOffice</text>
  <text x="90" y="458" font-family="Arial, sans-serif" font-size="12" fill="#777">Your central hub for business management</text>
  <text x="90" y="488" font-family="Arial, sans-serif" font-size="12" fill="#aaa">15 articles</text>

  <!-- Card 5: Online Orders -->
  <rect x="430" y="380" width="340" height="120" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="460" y="415" font-family="Arial, sans-serif" font-size="22" fill="#555">📁</text>
  <text x="460" y="440" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#111">Online Orders</text>
  <text x="460" y="458" font-family="Arial, sans-serif" font-size="12" fill="#777">Manage and process online orders</text>
  <text x="460" y="488" font-family="Arial, sans-serif" font-size="12" fill="#aaa">17 articles</text>

  <!-- Card 6: Reports -->
  <rect x="800" y="380" width="340" height="120" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="830" y="415" font-family="Arial, sans-serif" font-size="22" fill="#555">📁</text>
  <text x="830" y="440" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#111">Reports</text>
  <text x="830" y="458" font-family="Arial, sans-serif" font-size="12" fill="#777">Access and generate detailed reports</text>
  <text x="830" y="488" font-family="Arial, sans-serif" font-size="12" fill="#aaa">6 articles</text>

  <!-- Category cards row 3 -->
  <!-- Card 7: Tax Guides -->
  <rect x="60" y="520" width="340" height="120" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="90" y="555" font-family="Arial, sans-serif" font-size="22" fill="#555">📁</text>
  <text x="90" y="580" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#111">Tax Guides</text>
  <text x="90" y="598" font-family="Arial, sans-serif" font-size="12" fill="#777">Access essential tax guides</text>
  <text x="90" y="628" font-family="Arial, sans-serif" font-size="12" fill="#aaa">15 articles</text>

  <!-- Card 8: Hardware -->
  <rect x="430" y="520" width="340" height="120" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="460" y="555" font-family="Arial, sans-serif" font-size="22" fill="#555">📁</text>
  <text x="460" y="580" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#111">Hardware</text>
  <text x="460" y="598" font-family="Arial, sans-serif" font-size="12" fill="#777">Ensure hardware is set up correctly</text>
  <text x="460" y="628" font-family="Arial, sans-serif" font-size="12" fill="#aaa">14 articles</text>

  <!-- Card 9: External Integrations -->
  <rect x="800" y="520" width="340" height="120" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>
  <text x="830" y="555" font-family="Arial, sans-serif" font-size="22" fill="#555">📁</text>
  <text x="830" y="580" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#111">External Integrations</text>
  <text x="830" y="598" font-family="Arial, sans-serif" font-size="12" fill="#777">Integrate with supported apps</text>
  <text x="830" y="628" font-family="Arial, sans-serif" font-size="12" fill="#aaa">20 articles</text>
</svg>
